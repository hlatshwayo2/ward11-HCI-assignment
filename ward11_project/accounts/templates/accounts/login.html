<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bergville Ward 11 Connect - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .header p {
            color: #999;
            font-size: 12px;
        }
        .divider {
            height: 3px;
            background-color: #667eea;
            width: 50px;
            margin: 10px auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #764ba2;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 13px;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .note {
            background-color: #f0f4ff;
            padding: 10px;
            border-left: 4px solid #667eea;
            margin: 20px 0;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1>Bergville Ward 11 Connect</h1>
            <div class="divider"></div>
            <p>Community Service Reporting</p>
        </div>

        {% if error %}
        <div style="background-color: #f8d7da; padding: 12px; border-left: 4px solid #f5c6cb; border-radius: 3px; margin-bottom: 20px; color: #721c24;">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="village">Select Your Village:</label>
                <select name="village" id="village" required>
                    <option value="">-- Choose Your Village --</option>
                    {% for village in villages %}
                    <option value="{{ village }}">{{ village }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <div class="note">
                ℹ️ Selecting your village ensures you only see reports relevant to your area.
            </div>

            <button type="submit">Login to Ward 11 Connect</button>
        </form>

        <div class="footer">
            Don't have an account? <a href="/register/">Register here</a>
        </div>
    </div>
</body>
</html>
